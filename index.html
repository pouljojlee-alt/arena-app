        body {

        }

            display: flex;

            align-items: center;
            margin-bottom: 16px;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            animation: slideDown 0.4s ease;
            cursor: pointer;
        }
        #announcementBanner:hover { background: linear-gradient(135deg, #2d3a4f, #1e293b); }

            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            margin-left: 10px;
        }
        #announcementBanner .dismiss-btn:hover { background: rgba(255,255,255,0.15); }
